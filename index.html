<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#121212"/>
  <title>MiniSpot - The Weeknd 🎵</title>
  
  <!-- ✅ MANIFEST JSON ENLAZADO CORRECTAMENTE -->
  <link rel="manifest" href="/manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* ===== RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --green: #1DB954;
      --green-hover: #1ed760;
      --bg-base: #121212;
      --bg-surface: #181818;
      --bg-elevated: #282828;
      --bg-highlight: #3e3e3e;
      --text-base: #ffffff;
      --text-sub: #b3b3b3;
      --player-h: 90px;
      --sidebar-w: 260px;
      --radius: 8px;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: #000;
      color: var(--text-base);
      overflow: hidden;
    }

    /* ===== LAYOUT ===== */
    body {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      grid-template-rows: 1fr var(--player-h);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      background: #000000;
      padding: 20px 12px;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .sidebar::-webkit-scrollbar {
      display: none;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 24px;
      padding: 0 12px;
    }
    .logo i {
      color: var(--green);
      font-size: 2rem;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      border-radius: var(--radius);
      color: var(--text-sub);
      font-weight: 600;
      margin-bottom: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-link:hover,
    .nav-link.active {
      color: var(--text-base);
      background: var(--bg-elevated);
    }

    .library-header {
      padding: 16px 12px 8px;
      color: var(--text-sub);
      font-weight: 600;
    }

    .playlist-list {
      list-style: none;
    }
    .playlist-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }
    .playlist-list li:hover {
      background: var(--bg-elevated);
    }

    .pl-thumb {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #1DB954, #1ed760);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    /* ===== MAIN CONTENT ===== */
    .main-content {
      background: var(--bg-base);
      overflow-y: auto;
      padding: 0 32px 100px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      position: sticky;
      top: 0;
      background: var(--bg-base);
      z-index: 10;
    }

    .btn-upgrade {
      background: white;
      border: none;
      border-radius: 500px;
      padding: 8px 20px;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .btn-upgrade:hover {
      transform: scale(1.05);
    }

    .section-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 20px 0;
    }

    /* ===== FEATURED GRID ===== */
    .featured-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .featured-card {
      background: var(--bg-surface);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .featured-card:hover {
      background: var(--bg-elevated);
    }

    .feat-thumb {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }

    .feat-name {
      flex: 1;
      font-weight: 700;
    }

    /* ===== CARDS ===== */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .track-card {
      background: var(--bg-surface);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .track-card:hover {
      background: var(--bg-elevated);
    }

    .card-cover {
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .card-title {
      font-weight: 700;
      font-size: 0.9rem;
    }
    .card-sub {
      font-size: 0.75rem;
      color: var(--text-sub);
    }

    /* ===== VIEW SYSTEM ===== */
    .view {
      display: none;
    }
    .view.active {
      display: block;
    }

    /* ===== PLAYLIST DETAIL ===== */
    .playlist-hero {
      display: flex;
      align-items: flex-end;
      gap: 24px;
      padding: 40px 0 24px;
    }

    .playlist-hero-cover {
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }

    .playlist-hero-title {
      font-size: 2.5rem;
      font-weight: 800;
      margin: 8px 0;
    }

    .playlist-hero-desc {
      color: var(--text-sub);
      margin-top: 8px;
    }
    .playlist-hero-meta {
      font-size: 0.85rem;
      color: var(--text-sub);
      margin-top: 8px;
    }

    .play-big-btn {
      background: var(--green);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      margin: 20px 0;
      transition: transform 0.1s;
    }
    .play-big-btn:hover {
      transform: scale(1.05);
    }

    /* ===== TRACK TABLE ===== */
    .track-table {
      width: 100%;
      border-collapse: collapse;
    }

    .track-table th {
      text-align: left;
      padding: 12px 8px;
      color: var(--text-sub);
      font-weight: 500;
      font-size: 0.75rem;
      border-bottom: 1px solid var(--bg-elevated);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .track-table td {
      padding: 12px 8px;
      border-bottom: 1px solid #222;
      cursor: pointer;
      transition: background 0.2s;
    }
    .track-table tr:hover td {
      background: var(--bg-elevated);
    }
    .track-table td:first-child {
      text-align: center;
      width: 40px;
      color: var(--text-sub);
    }
    .track-table td:last-child {
      text-align: right;
      color: var(--text-sub);
    }

    .track-name {
      font-weight: 600;
    }
    .track-artist {
      font-size: 0.75rem;
      color: var(--text-sub);
      margin-top: 2px;
    }

    .track-table tr.playing {
      background: #1DB95433;
    }

    /* ===== SEARCH ===== */
    .search-box {
      background: var(--bg-surface);
      border-radius: 500px;
      padding: 12px 20px;
      margin: 16px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .search-box input {
      background: none;
      border: none;
      color: var(--text-base);
      font-size: 1rem;
      width: 100%;
      outline: none;
    }
    .search-box input::placeholder {
      color: var(--text-sub);
    }

    .result-item {
      background: var(--bg-surface);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.2s;
    }
    .result-item:hover {
      background: var(--bg-elevated);
    }

    /* ===== PLAYER BAR ===== */
    .player-bar {
      background: var(--bg-elevated);
      border-top: 1px solid #000;
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      align-items: center;
      padding: 0 20px;
    }

    .now-playing {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .now-playing-cover {
      width: 56px;
      height: 56px;
      background: var(--bg-highlight);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .now-title {
      font-weight: 700;
      font-size: 0.9rem;
    }
    .now-artist {
      font-size: 0.75rem;
      color: var(--text-sub);
    }

    .player-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .control-btns {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .play-pause-btn {
      width: 38px;
      height: 38px;
      background: white;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .play-pause-btn:hover {
      transform: scale(1.05);
    }

    .progress-track {
      width: 400px;
      height: 4px;
      background: #555;
      border-radius: 4px;
      cursor: pointer;
      position: relative;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: var(--green);
      border-radius: 4px;
    }

    /* ===== UTILITIES ===== */
    .icon-btn {
      background: none;
      border: none;
      color: var(--text-sub);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 8px;
      transition: all 0.2s;
    }
    .icon-btn:hover {
      color: white;
    }
    .active-btn {
      color: var(--green) !important;
    }

    .back-btn {
      background: none;
      border: none;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 500px;
    }
    .back-btn:hover {
      background: var(--bg-elevated);
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #1DB954;
      color: black;
      padding: 12px 24px;
      border-radius: 500px;
      font-weight: bold;
      z-index: 1000;
      animation: fadeOut 3s ease forwards;
    }
    .toast.error {
      background: #e74c3c;
      color: white;
    }

    @keyframes fadeOut {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      body {
        grid-template-columns: 1fr;
      }
      .sidebar {
        display: none;
      }
      .progress-track {
        width: 150px;
      }
      .playlist-hero-title {
        font-size: 1.5rem;
      }
      .playlist-hero-cover {
        width: 120px;
        height: 120px;
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="logo">
      <i class="fa-brands fa-spotify"></i>
      <span>MiniSpot</span>
    </div>
    <nav>
      <div class="nav-link active" data-view="home">
        <i class="fa-solid fa-house"></i>
        <span>Inicio</span>
      </div>
      <div class="nav-link" data-view="search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <span>Buscar</span>
      </div>
    </nav>
    <div class="library-header">
      <span><i class="fa-solid fa-book"></i> Tu biblioteca</span>
    </div>
    <ul class="playlist-list" id="playlistList"></ul>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">
    <div class="topbar">
      <button class="back-btn" id="backBtn" style="display: none;">
        <i class="fa-solid fa-arrow-left"></i> Volver
      </button>
      <button class="btn-upgrade">Explorar Premium</button>
    </div>

    <!-- HOME VIEW -->
    <div id="homeView" class="view active">
      <h2 class="section-title">Buenas tardes</h2>
      <div class="featured-grid" id="featuredGrid"></div>
      <div id="playlistsContainer"></div>
    </div>

    <!-- SEARCH VIEW -->
    <div id="searchView" class="view">
      <div class="search-box">
        <i class="fa-solid fa-search"></i>
        <input type="text" id="searchInput" placeholder="Busca canciones de The Weeknd..." autocomplete="off">
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>

    <!-- PLAYLIST DETAIL VIEW -->
    <div id="playlistView" class="view">
      <div class="playlist-hero">
        <div class="playlist-hero-cover" id="detailCover">🎵</div>
        <div>
          <div class="playlist-label">LISTA DE REPRODUCCIÓN</div>
          <h1 class="playlist-hero-title" id="detailTitle"></h1>
          <div class="playlist-hero-desc" id="detailDesc"></div>
          <div class="playlist-hero-meta" id="detailMeta"></div>
        </div>
      </div>
      <button class="play-big-btn" id="playBigBtn">
        <i class="fa-solid fa-play"></i>
      </button>
      <table class="track-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Título</th>
            <th>Álbum</th>
            <th><i class="fa-regular fa-clock"></i></th>
          </tr>
        </thead>
        <tbody id="trackTable"></tbody>
      </table>
    </div>
  </main>

  <!-- ===== PLAYER BAR ===== -->
  <footer class="player-bar">
    <div class="now-playing">
      <div class="now-playing-cover" id="playerCover">
        <i class="fa-solid fa-headphones"></i>
      </div>
      <div>
        <div class="now-title" id="playerTitle">MiniSpot</div>
        <div class="now-artist" id="playerArtist">Selecciona una canción</div>
      </div>
    </div>
    <div class="player-controls">
      <div class="control-btns">
        <button class="icon-btn" id="shuffleBtn"><i class="fa-solid fa-shuffle"></i></button>
        <button class="icon-btn" id="prevBtn"><i class="fa-solid fa-backward-step"></i></button>
        <button class="play-pause-btn" id="playPauseBtn"><i class="fa-solid fa-play" id="playIcon"></i></button>
        <button class="icon-btn" id="nextBtn"><i class="fa-solid fa-forward-step"></i></button>
        <button class="icon-btn" id="repeatBtn"><i class="fa-solid fa-repeat"></i></button>
      </div>
      <div style="display: flex; align-items: center; gap: 12px;">
        <span style="font-size: 0.7rem;" id="currentTime">0:00</span>
        <div class="progress-track" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span style="font-size: 0.7rem;" id="totalTime">0:00</span>
      </div>
    </div>
    <div style="display: flex; justify-content: flex-end;">
      <button class="icon-btn" id="volumeBtn"><i class="fa-solid fa-volume-high"></i></button>
    </div>
  </footer>

  <audio id="audioPlayer"></audio>

  <!-- ===== JAVASCRIPT ===== -->
  <script>
    // ============================================
    // 🎵 PLAYLISTS CON RUTAS DE TUS MP3
    // ============================================

    const playlists = [{
      id: 1,
      name: "⭐ The Weeknd · Éxitos",
      description: "Los mejores hits del rey del R&B",
      cover: "⭐",
      tracks: [{
          id: 1,
          title: "Blinding Lights",
          artist: "The Weeknd",
          album: "After Hours",
          duration: "3:20",
          audioPath: "The Weeknd - Blinding Lights (Official Audio).mp3"
        },
        {
          id: 2,
          title: "Starboy",
          artist: "The Weeknd ft. Daft Punk",
          album: "Starboy",
          duration: "3:48",
          audioPath: "The Weeknd - Starboy (Audio) ft. Daft Punk.mp3"
        },
        {
          id: 3,
          title: "The Hills",
          artist: "The Weeknd",
          album: "Beauty Behind the Madness",
          duration: "4:02",
          audioPath: "The Weeknd - The Hills.mp3"
        },
        {
          id: 4,
          title: "Save Your Tears",
          artist: "The Weeknd",
          album: "After Hours",
          duration: "3:35",
          audioPath: "The Weeknd - Save Your Tears (Official Music Video).mp3"
        },
        {
          id: 5,
          title: "Can't Feel My Face",
          artist: "The Weeknd",
          album: "Beauty Behind the Madness",
          duration: "3:35",
          audioPath: "The Weeknd - Can't Feel My Face (Official Video).mp3"
        }
      ]
    }];

    // ============================================
    // REPRODUCTOR - CÓDIGO COMPLETO
    // ============================================

    let currentPlaylist = null;
    let currentTrackIndex = 0;
    let currentQueue = [];
    let isPlaying = false;
    let shuffleMode = false;
    let repeatMode = false;
    let audio = document.getElementById('audioPlayer');
    let progressInterval = null;

    // Elementos DOM
    const homeView = document.getElementById('homeView');
    const searchView = document.getElementById('searchView');
    const playlistView = document.getElementById('playlistView');
    const featuredGrid = document.getElementById('featuredGrid');
    const playlistsContainer = document.getElementById('playlistsContainer');
    const playlistList = document.getElementById('playlistList');
    const trackTable = document.getElementById('trackTable');
    const detailTitle = document.getElementById('detailTitle');
    const detailDesc = document.getElementById('detailDesc');
    const detailMeta = document.getElementById('detailMeta');
    const detailCover = document.getElementById('detailCover');
    const playBigBtn = document.getElementById('playBigBtn');
    const playerTitle = document.getElementById('playerTitle');
    const playerArtist = document.getElementById('playerArtist');
    const playerCover = document.getElementById('playerCover');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playIcon = document.getElementById('playIcon');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const progressFill = document.getElementById('progressFill');
    const progressBar = document.getElementById('progressBar');
    const currentTimeSpan = document.getElementById('currentTime');
    const totalTimeSpan = document.getElementById('totalTime');
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    const backBtn = document.getElementById('backBtn');

    function showToast(message, isError = false) {
      const toast = document.createElement('div');
      toast.className = 'toast' + (isError ? ' error' : '');
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function loadTrack(track) {
      if (!track) return;
      playerTitle.textContent = track.title;
      playerArtist.textContent = track.artist;
      playerCover.innerHTML = `<i class="fa-solid fa-music"></i>`;

      if (!track.audioPath || track.audioPath === "") {
        showToast(`⚠️ ${track.title} - No tiene archivo de audio`, true);
        return;
      }

      audio.src = track.audioPath;
      audio.load();

      audio.addEventListener('loadedmetadata', () => {
        totalTimeSpan.textContent = formatTime(audio.duration);
      });

      audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
          const percent = (audio.currentTime / audio.duration) * 100;
          progressFill.style.width = `${percent}%`;
          currentTimeSpan.textContent = formatTime(audio.currentTime);
        }
      });

      audio.addEventListener('ended', () => {
        if (repeatMode) {
          playTrackAtIndex(currentTrackIndex);
        } else {
          nextTrack();
        }
      });

      audio.addEventListener('error', () => {
        showToast(`❌ Error al cargar: ${track.title}`, true);
      });
    }

    function playTrack() {
      if (!audio.src) {
        showToast("🎵 Selecciona una canción primero", true);
        return;
      }
      audio.play().catch(e => {
        showToast(`❌ No se pudo reproducir`, true);
      });
      isPlaying = true;
      playIcon.className = "fa-solid fa-pause";
    }

    function pauseTrack() {
      audio.pause();
      isPlaying = false;
      playIcon.className = "fa-solid fa-play";
    }

    function togglePlay() {
      if (isPlaying) pauseTrack();
      else playTrack();
    }

    function playTrackAtIndex(index) {
      if (!currentQueue[index]) return;
      currentTrackIndex = index;
      loadTrack(currentQueue[index]);
      playTrack();
      highlightCurrentTrack();
    }

    function nextTrack() {
      if (!currentQueue.length) return;
      let next = currentTrackIndex + 1;
      if (next >= currentQueue.length) {
        if (repeatMode) next = 0;
        else return;
      }
      playTrackAtIndex(next);
    }

    function prevTrack() {
      if (!currentQueue.length) return;
      let prev = currentTrackIndex - 1;
      if (prev < 0) prev = 0;
      playTrackAtIndex(prev);
    }

    function buildQueue(playlist, isShuffle) {
      let tracks = [...playlist.tracks];
      if (isShuffle) {
        for (let i = tracks.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [tracks[i], tracks[j]] = [tracks[j], tracks[i]];
        }
      }
      return tracks;
    }

    function setPlaylist(playlist, startIndex = 0) {
      currentPlaylist = playlist;
      currentQueue = buildQueue(playlist, shuffleMode);
      currentTrackIndex = Math.min(startIndex, currentQueue.length - 1);
      playTrackAtIndex(currentTrackIndex);
      renderPlaylistDetail(playlist);

      homeView.classList.remove('active');
      searchView.classList.remove('active');
      playlistView.classList.add('active');
      backBtn.style.display = 'flex';
    }

    function renderPlaylistDetail(playlist) {
      detailTitle.textContent = playlist.name;
      detailDesc.textContent = playlist.description;
      detailMeta.textContent = `${playlist.tracks.length} canciones • ${new Date().getFullYear()}`;
      detailCover.textContent = playlist.cover;

      trackTable.innerHTML = '';
      playlist.tracks.forEach((track, idx) => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${idx + 1}</td>
            <td><div class="track-name">${track.title}</div><div class="track-artist">${track.artist}</div></td>
            <td>${track.album}</td>
            <td>${track.duration}</td>
          `;
        row.onclick = () => setPlaylist(playlist, idx);
        trackTable.appendChild(row);
      });
      highlightCurrentTrack();
    }

    function highlightCurrentTrack() {
      const rows = trackTable.querySelectorAll('tr');
      rows.forEach((row, i) => {
        if (currentQueue[currentTrackIndex] && currentPlaylist) {
          const currentTrack = currentQueue[currentTrackIndex];
          const rowTrack = currentPlaylist.tracks[i];
          if (rowTrack && currentTrack.id === rowTrack.id) {
            row.classList.add('playing');
          } else {
            row.classList.remove('playing');
          }
        }
      });
    }

    // ========== BÚSQUEDA ==========
    function performSearch(query) {
      if (!query.trim()) {
        searchResults.innerHTML =
          '<div style="text-align:center;padding:40px;color:#b3b3b3">🔍 Escribe el nombre de una canción...</div>';
        return;
      }

      const lowerQuery = query.toLowerCase();
      const allTracks = [];

      playlists.forEach(playlist => {
        playlist.tracks.forEach(track => {
          allTracks.push({
            ...track,
            playlistName: playlist.name,
            playlistId: playlist.id,
            playlistCover: playlist.cover
          });
        });
      });

      const results = allTracks.filter(track =>
        track.title.toLowerCase().includes(lowerQuery) ||
        track.artist.toLowerCase().includes(lowerQuery) ||
        track.playlistName.toLowerCase().includes(lowerQuery)
      );

      if (results.length === 0) {
        searchResults.innerHTML =
          `<div style="text-align:center;padding:40px;color:#b3b3b3">🎵 No encontramos resultados para "${query}"</div>`;
        return;
      }

      searchResults.innerHTML = `
          <h3 style="margin-bottom:16px">🎧 Resultados (${results.length})</h3>
          ${results.map(track => `
            <div class="result-item" data-id="${track.id}">
              <div style="width:48px;height:48px;background:linear-gradient(135deg,#1DB954,#1ed760);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.5rem">${track.playlistCover}</div>
              <div style="flex:1">
                <div><strong>${track.title}</strong></div>
                <div style="font-size:0.8rem;color:#b3b3b3">${track.artist} • ${track.playlistName}</div>
              </div>
              <div style="color:#b3b3b3">${track.duration}</div>
            </div>
          `).join('')}
        `;

      document.querySelectorAll('.result-item').forEach((item, idx) => {
        item.onclick = () => {
          const playlist = playlists.find(p => p.id === results[idx].playlistId);
          const trackIndex = playlist.tracks.findIndex(t => t.id === results[idx].id);
          setPlaylist(playlist, trackIndex);
        };
      });
    }

    // ========== RENDER HOME ==========
    function renderHome() {
      featuredGrid.innerHTML = playlists.map(pl => `
          <div class="featured-card" data-id="${pl.id}">
            <div class="feat-thumb">${pl.cover}</div>
            <div class="feat-name">${pl.name}</div>
          </div>
        `).join('');

      document.querySelectorAll('.featured-card').forEach(card => {
        card.onclick = () => {
          const playlist = playlists.find(p => p.id === parseInt(card.dataset.id));
          setPlaylist(playlist, 0);
        };
      });

      playlistsContainer.innerHTML = '';
      playlists.forEach(pl => {
        const section = document.createElement('div');
        section.innerHTML =
          `<h3 style="margin:20px 0 12px; font-size:1.4rem;">${pl.name}</h3><div class="cards-grid" id="grid-${pl.id}"></div>`;
        playlistsContainer.appendChild(section);

        const grid = document.getElementById(`grid-${pl.id}`);
        pl.tracks.slice(0, 4).forEach((track, idx) => {
          const card = document.createElement('div');
          card.className = 'track-card';
          card.innerHTML = `
              <div class="card-cover">${pl.cover}</div>
              <div class="card-title">${track.title}</div>
              <div class="card-sub">${track.artist}</div>
            `;
          card.onclick = () => setPlaylist(pl, idx);
          grid.appendChild(card);
        });
      });

      playlistList.innerHTML = '';
      playlists.forEach(pl => {
        const li = document.createElement('li');
        li.innerHTML =
          `<div class="pl-thumb">${pl.cover}</div><div><strong>${pl.name}</strong><br><span style="font-size:0.7rem;color:#b3b3b3">${pl.tracks.length} canciones</span></div>`;
        li.onclick = () => setPlaylist(pl, 0);
        playlistList.appendChild(li);
      });
    }

    // ========== NAVEGACIÓN ==========
    function showView(viewName) {
      homeView.classList.remove('active');
      searchView.classList.remove('active');
      playlistView.classList.remove('active');

      if (viewName === 'home') homeView.classList.add('active');
      if (viewName === 'search') searchView.classList.add('active');
      if (viewName === 'playlist') playlistView.classList.add('active');

      backBtn.style.display = (viewName === 'home') ? 'none' : 'flex';
    }

    document.querySelectorAll('[data-view]').forEach(el => {
      el.onclick = () => {
        showView(el.dataset.view);
        if (el.dataset.view === 'search' && searchInput.value) {
          performSearch(searchInput.value);
        }
      };
    });

    backBtn.onclick = () => showView('home');

    // ========== EVENT LISTENERS ==========
    playPauseBtn.onclick = togglePlay;
    playBigBtn.onclick = togglePlay;
    nextBtn.onclick = nextTrack;
    prevBtn.onclick = prevTrack;

    shuffleBtn.onclick = () => {
      shuffleMode = !shuffleMode;
      shuffleBtn.classList.toggle('active-btn', shuffleMode);
      if (currentPlaylist) {
        const currentTrack = currentQueue[currentTrackIndex];
        currentQueue = buildQueue(currentPlaylist, shuffleMode);
        const newIndex = currentQueue.findIndex(t => t.id === currentTrack?.id);
        currentTrackIndex = newIndex !== -1 ? newIndex : 0;
        playTrackAtIndex(currentTrackIndex);
      }
    };

    repeatBtn.onclick = () => {
      repeatMode = !repeatMode;
      repeatBtn.classList.toggle('active-btn', repeatMode);
    };

    progressBar.onclick = (e) => {
      if (!audio.duration) return;
      const rect = progressBar.getBoundingClientRect();
      const percent = (e.clientX - rect.left) / rect.width;
      audio.currentTime = percent * audio.duration;
    };

    searchInput.oninput = (e) => performSearch(e.target.value);

    // Volumen
    const volumeBtn = document.getElementById('volumeBtn');
    let volume = 0.7;
    audio.volume = volume;

    volumeBtn.onclick = () => {
      if (audio.volume > 0) {
        audio.volume = 0;
        volumeBtn.innerHTML = '<i class="fa-solid fa-volume-off"></i>';
      } else {
        audio.volume = volume;
        volumeBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
      }
    };

    // Inicializar
    renderHome();
    showToast("🎧 MiniSpot - Elige una canción y dale PLAY!");
  </script>

</body>
</html>
